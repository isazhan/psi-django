{% extends '../base/base.html' %}

{% block content %}
{% load static %}

{% if request.user.username == 'u.isazhan@psi-group.kz' %}
<div>
    <a type="button" class="btn btn-success" href="{% url 'create_project' %}">Создать проект</a>
</div>
{% endif %}

{% for x in projects %}

    <div class="border rounded-4 m-2 p-2">
        <div class="card-tittle row">
            <div class="col-sm">
                <h4>{{ x.project_number }} - {{ x.project_name }}</h4>
            </div>


            <div class="col-sm">
                <p class="text-end">Статус:</p>

            </div>
            
            
        </div>

        <div class="card-body row">

            <div class="col-sm-3">
                
            </div>

            <div class="col-sm p-2">               
                
            
            </div>

        </div>
        <a type="button" class="btn btn-primary" href="{{ x.project_number }}">Перейти в проект</a>
    </div>

{% endfor %}
{% endblock content %}
